user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
}

http {

        ##
        # Basic Settings
        ##

        sendfile on;
        tcp_nopush on;
        types_hash_max_size 2048;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        ##
        # SSL Settings — только безопасные протоколы
        ##

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        ##
        # Logging Settings
        ##

        access_log /var/log/nginx/access.log;

        ##
        # Gzip Settings
        ##

        gzip on;

        ##
        # Virtual Host Configs
        ##

        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;

         # ── Безопасность ──────────────────────────────────────────
        server_tokens off;

        # Rate limiting: отдельные зоны для webhook и остального
        limit_req_zone $binary_remote_addr zone=webhook:10m rate=30r/s;
        limit_req_zone $binary_remote_addr zone=api:10m     rate=10r/s;
        limit_req_status     429;
        limit_req_log_level  warn;

        # Лимит одновременных соединений с одного IP
        limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

        # Защита от Slowloris
        client_body_timeout   10s;
        client_header_timeout 10s;
        keepalive_timeout     30s;
        send_timeout          10s;

        # Прямая загрузка файлов ограничена
        client_max_body_size  50m;

        # ── Gzip ──────────────────────────────────────────────────
        gzip_vary on;
        gzip_min_length 1000;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json
               application/javascript text/javascript;
}
