server {
    server_name ai.sst13.ru;

    # ── Security headers ──────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' https://st.max.ru 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self';" always;

    # ── OCSP Stapling ─────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/ai.sst13.ru/chain.pem;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # ── Лимит соединений ──────────────────────────────────────
    limit_conn conn_limit 20;

    # ── Блокировка опасных HTTP-методов ───────────────────────
    if ($request_method ~* ^(PROPFIND|TRACK|TRACE)$) {
        return 444;
    }

    # ── Блокировка сканеров — расширенный regex ───────────────
    # Ловит: .env / .env.*, .git в любом каталоге, actuator,
    # wp-json, wp-admin, phpmyadmin, cloud credentials и т.д.
    location ~* (\.env($|[.\-_/])|/\.git/|/actuator/|/wp-json/|/webadmin/|/phpmyadmin|/pma/|/wp-admin/|/manager/html|/manager/|/jmx-console/|/web-console/|/\.aws/|/\.gcloud/|/\.azure/|/credentials|/\.svn/|/\.hg/|/\.bzr/|/cvs/) {
        return 444;
    }

    # ── Блокировка файлов по расширению ───────────────────────
    location ~* \.(bak|config|sql|sql\.gz|tar|zip|rar|log|ini|sqlite|old|orig|dist|swp|save|dump|dat|bin|inc|yml|yaml|pem|key|cert)$ {
        return 444;
    }
    
    # ── Webhook ───────────────────────────────────────────────
    location /webhook {
        include proxy_params;
        limit_req zone=webhook burst=100 nodelay;
        proxy_pass http://unix:/tmp/fastapi.sock;
    }

    # ── Основной прокси ───────────────────────────────────────
    location / {
        include proxy_params;
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://unix:/tmp/fastapi.sock;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ai.sst13.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ai.sst13.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = ai.sst13.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name ai.sst13.ru;
    return 404; # managed by Certbot
}
