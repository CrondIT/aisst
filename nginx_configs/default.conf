# Default server — закрывает доступ по IP и неизвестным hostname
# nano /etc/nginx/sites-available/default

server {
    listen 80 default_server;
    listen 443 ssl default_server;

    # SSL-сертификаты (можно любые, т.к. при возврате 444 соединение закрывается без ответа)
    ssl_certificate     /etc/letsencrypt/live/ai.sst13.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.sst13.ru/privkey.pem;

    # Завершаем соединение без ответа — сканер не получает ни 200, ни 404
    return 444;
}
